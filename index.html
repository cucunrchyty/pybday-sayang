<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"

    />
  </head>
  <body

    background-position: center;
    background-repeat: no-repeat;

    "
    class="flex justify-center items-start h-screen pt-24"
>

  <div id="breakingNews" class="text-center text-white">

    <h1 class="text-4xl font-bold text-yellow-400 animate__animated animate__flash animate__infinite">
  🚨 BREAKING NEWS 🚨
</h1>

<p class="mt-4 text-xl">
  Manchester United dengan bangga mengumumkan...
</p>

<p class="mt-2 text-2xl font-bold text-red-300">
  Hari ini adalah ulang tahun fans no 1nya king emyu ❤️
</p>

<button
  onclick="masukKartu()"
  class="mt-5 p-3 bg-red-700 rounded text-white hover:bg-red-900"
>
  Enter Old Trafford ⚽
</button>

    </div>
    <div
  id="kartu"
  class="hidden bg-black/40 backdrop-blur-md border-2 border-yellow-400 px-5 py-4 rounded-xl text-center w-80"
>

  <h1 class="text-3xl text-white">
    Happy Birthday 🎂

  <button
    class="p-2 bg-red-700 text-white rounded mt-5 hover:bg-red-900 transition w-full"

  >

    <div class="text-6xl mt-5 animate__animated animate__bounce">
🏆
</div>

<h2 class="text-yellow-400 font-bold text-xl mt-3">

</h2>
  </button>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
    <script>
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
      });
      let kartu = document.getElementById("kartu");
      function masukKartu() {
        document.getElementById("musik").play();
        document.getElementById("breakingNews").classList.add("hidden");
        document.getElementById("kartu").classList.remove("hidden");
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
        });

}
function ubahKartu() {
        kartu.innerHTML = `    
        <h1 class="font-semibold text-rose-400 text-left leading-7 animate__animated animate__zoomIn">
      Selamat ulang tahun, abang <3 Semoga tahun ini makin banyak kebahagiaan,
      rezeki lancar, dan segala impian jadi kenyataan. Semoga kita terus bisa
      bareng-bareng, seru-seruan, dan saling dukung ya! 🎉🎂
    </h1>
    <h2 class="mt-3 text-pink-300 text-left animate__animated animate__fadeIn">
       with love, pacarmu yang cantik ini <3 
    </h2>
    <img
      src="foto1.jpg"
      class="rounded-xl mt-4 border-2 border-yellow-400 w-full h-56 object-cover"
    />
    <button
    class="bg-pink-600 p-2 rounded mt-3"
    onclick="secretMessage()"
    > 
    💌 Pesan rahasia
    </button>
    
    <button
      class="p-2 bg-red-600 text-white rounded mt-5 hover:bg-slate-900 transition ease-in w-full animate__animated animate__delay-1s animate__tada"
      onclick="refreshpage()"
    >

    `;
      }
      function secretMessage( ) {
  alert(
      "terimakasii banyak yaa abangg udah dateng di kehidupanku, semoga diumur yang baru ini kamu selalu bahagia, sehat dan semua cita-cita kamu tercapai aamiin. aku sayang abangg <3"
      );
      }
      function refreshpage() {
        location.reload();
      }
    </script>
    <audio id="musik" loop>
      <source src="musik.mp3" type="audio/mpeg">
      </audio>
  </body>
</html>
